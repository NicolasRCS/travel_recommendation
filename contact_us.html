<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - TravelBloom</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      color: white;
      background-image: linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.35)),
                        url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .navbar {
      height: 70px;
      background-color: rgba(23, 48, 66, 0.92);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      font-size: 20px;
      font-style: italic;
      font-weight: bold;
    }

    .logo img {
      width: 38px;
      height: 38px;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 28px;
    }

    .nav-links a {
      text-decoration: none;
      color: white;
      font-size: 14px;
      font-weight: bold;
    }

    .nav-links a:hover {
      color: #9ed6d2;
    }

    .contact-section {
      position: relative;
      min-height: calc(100vh - 70px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 40px 60px 40px 50px;
    }

    .social-icons {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .social-icons a {
      color: white;
      text-decoration: none;
      font-size: 18px;
    }

    .left-content {
      margin-left: 40px;
      max-width: 420px;
    }

    .left-content h1 {
      font-size: 58px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .left-content p {
      font-size: 18px;
      color: #f1f1f1;
    }

    .form-box {
      width: 420px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 25px;
      border-radius: 6px;
      backdrop-filter: blur(3px);
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: white;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 4px;
      color: white;
      font-size: 14px;
      outline: none;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    .form-group textarea {
      min-height: 120px;
      resize: vertical;
    }

    .submit-btn {
      width: 100%;
      border: none;
      background-color: #2d7f95;
      color: white;
      padding: 12px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
    }

    .submit-btn:hover {
      background-color: #256d80;
    }

    @media (max-width: 900px) {
      .contact-section {
        flex-direction: column;
        align-items: flex-start;
        gap: 30px;
      }

      .left-content h1 {
        font-size: 42px;
      }

      .form-box {
        width: 100%;
        max-width: 500px;
        margin-left: 40px;
      }
    }

    @media (max-width: 600px) {
      .navbar {
        flex-direction: column;
        height: auto;
        padding: 15px;
        gap: 12px;
      }

      .contact-section {
        padding: 30px 20px 40px 20px;
      }

      .left-content {
        margin-left: 30px;
      }

      .left-content h1 {
        font-size: 34px;
      }

      .left-content p {
        font-size: 16px;
      }

      .form-box {
        margin-left: 30px;
        width: calc(100% - 30px);
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <img src="https://cdn-icons-png.flaticon.com/512/201/201623.png" alt="logo">
      <span>TravelBloom</span>
    </div>

    <ul class="nav-links">
      <li><a href="travel_recommendation.html">Home</a></li>
      <li><a href="about_us.html">About Us</a></li>
      <li><a href="contact_us.html">Contact Us</a></li>
    </ul>
  </nav>

  <section class="contact-section">
    <div class="social-icons">
      <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
      <a href="#"><i class="fa-brands fa-youtube"></i></a>
    </div>

    <div class="left-content">
      <h1>CONTACT US</h1>
      <p>Get in touch</p>
    </div>

    <div class="form-box">
      <form>
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your name">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email">
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Enter your message"></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit</button>
      </form>
    </div>
  </section>

</body>
</html>
